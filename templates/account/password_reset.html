{% extends 'base.html' %}
{% load allauth account %}
{% block title %}Recuperar Contraseña{% endblock %}
{% block footer %}{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-bg"><div class="hero-grid"></div></div>
  <div class="container d-flex align-items-center justify-content-center min-vh-100">
    <div class="auth-card">
      <div class="text-center mb-4">
        <div class="mx-auto mb-3" style="width:64px;height:64px;background:rgba(255,193,7,0.1);border-radius:50%;display:flex;align-items:center;justify-content:center">
          <i class="bi bi-key-fill text-warning fs-2"></i>
        </div>
        <h4 class="text-white fw-bold">Recuperar Contraseña</h4>
        <p class="text-muted small">Ingresa tu email y te enviaremos instrucciones</p>
      </div>
      <form method="post">
        {% csrf_token %}
        <div class="mb-4">
          <label class="form-label">Email</label>
          <div class="input-group">
            <span class="input-group-text nova-input-addon"><i class="bi bi-envelope"></i></span>
            <input type="email" name="email" class="form-control nova-input" placeholder="tu@email.com" required autofocus>
          </div>
        </div>
        <div class="d-grid mb-3">
          <button type="submit" class="btn btn-warning btn-lg fw-semibold text-dark">
            <i class="bi bi-send me-2"></i>Enviar Instrucciones
          </button>
        </div>
      </form>
      <div class="text-center">
        <a href="{% url 'account_login' %}" class="text-muted small">
          <i class="bi bi-arrow-left me-1"></i>Volver al Login
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
